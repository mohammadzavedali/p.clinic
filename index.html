<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prantik Clinic | Premium Healthcare</title>
    
    <!-- Google Fonts for Premium Look (Poppins) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* =========================================
           CSS Variables & Color Psychology
           ========================================= */
        :root {
            --primary-blue: #0056b3; /* Trust, Professionalism */
            --light-blue: #e8f4fc; /* Calmness */
            --healing-green: #10b981; /* Health, Success */
            --hover-green: #059669;
            --text-dark: #1e293b; /* Readability */
            --text-light: #64748b;
            --white: #ffffff; /* Cleanliness */
            --shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s ease-in-out;
        }

        /* =========================================
           Global Styles
           ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--light-blue);
            color: var(--text-dark);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* =========================================
           Header Section
           ========================================= */
        header {
            background: linear-gradient(135deg, #0056b3, #0099ff);
            color: var(--white);
            text-align: center;
            padding: 40px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.2rem;
            margin-top: 10px;
            opacity: 0.9;
        }

        /* =========================================
           Main Content & Doctors Section
           ========================================= */
        main {
            flex: 1;
            padding: 50px 20px;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        .doctors-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            margin-top: 20px;
        }

        /* Doctor Card */
        .doctor-card {
            background-color: var(--white);
            border-radius: 20px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            box-shadow: var(--shadow);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            cursor: pointer;
            position: relative;
            border: 2px solid transparent;
        }

        .doctor-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0, 86, 179, 0.2);
            border-color: rgba(0, 86, 179, 0.3);
        }

        .doctor-image-wrapper {
            width: 100%;
            height: 300px;
            overflow: hidden;
        }

        .doctor-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
            transition: var(--transition);
        }

        .doctor-card:hover .doctor-image-wrapper img {
            transform: scale(1.05);
        }

        .doctor-info {
            padding: 25px;
            text-align: center;
        }

        .doctor-info h3 {
            font-size: 1.5rem;
            color: var(--primary-blue);
            margin-bottom: 8px;
        }

        .doctor-info p.degree {
            font-size: 1rem;
            color: var(--text-light);
            font-weight: 600;
            margin-bottom: 15px;
        }

        /* Booking Button */
        .book-btn {
            background: var(--healing-green);
            color: var(--white);
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .book-btn:hover {
            background: var(--hover-green);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
        }

        /* =========================================
           Footer Section
           ========================================= */
        footer {
            background-color: var(--text-dark);
            color: var(--white);
            text-align: center;
            padding: 30px 20px;
            margin-top: auto;
        }

        .location {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .location i {
            color: #ff4757; /* Red for location pin */
            font-size: 1.3rem;
        }

        .copyright {
            font-size: 0.9rem;
            color: #94a3b8;
        }

        /* =========================================
           Responsive Design
           ========================================= */
        @media (max-width: 768px) {
            header h1 {
                font-size: 2.2rem;
            }
            .doctors-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <header>
        <h1>Prantik Clinic</h1>
        <p>Committed to Your Well-being</p>
    </header>

    <!-- Main Content -->
    <main>
        <div class="doctors-container">
            
            <!-- Doctor 1 (Male) - Links to another page -->
            <a href="male-doctor-profile.html" class="doctor-card" onclick="handleCardClick(event, 'Dr. A. Kamal')">
                <div class="doctor-image-wrapper">
                    <!-- Placeholder Image (Replace with original photo) -->
                    <img src="dr-a-kamal.jpeg" alt="Dr. A. Kamal">
                </div>
                <div class="doctor-info">
                    <h3>Dr. A. Kamal</h3>
                    <p class="degree">MBBS, MS (GYNE-OBS)<br>Laparoscopic Surgeon</p>
                    <button class="book-btn" onclick="handleBookingClick(event, 'Dr. A. Kamal')">
                        <i class="fa-solid fa-calendar-check"></i> Book & Pay Online
                    </button>
                </div>
            </a>

            <!-- Doctor 2 (Female) - Links to another page -->
            <a href="female-doctor-profile.html" class="doctor-card" onclick="handleCardClick(event, 'Dr. T. Haque')">
                <div class="doctor-image-wrapper">
                    <!-- Placeholder Image (Replace with original photo) -->
                    <img src="dr-t-haque.jpeg" alt="Dr. T. Haque">
                </div>
                <div class="doctor-info">
                    <h3>Dr. T. Haque</h3>
                    <p class="degree">MBBS, MS (GYNE-OBS)<br>Gynecologist & Obstetrician</p>
                    <button class="book-btn" onclick="handleBookingClick(event, 'Dr. T. Haque')">
                        <i class="fa-solid fa-calendar-check"></i> Book & Pay Online
                    </button>
                </div>
            </a>

        </div>
    </main>

    <!-- Footer Section -->
    <footer>
        <div class="location">
            <i class="fa-solid fa-location-dot"></i>
            <p>Berhampore, Murshidabad, Near Hotel Samrat, West Bengal, 742102</p>
        </div>
        <p class="copyright">&copy; 2026 Prantik Clinic. All Rights Reserved.</p>
    </footer>

    <!-- JavaScript for Interactivity -->
    <script>
        // Function: When the card or image is clicked
        function handleCardClick(event, doctorName) {
            // Prevent triggering if the book button is clicked
            if (event.target.closest('.book-btn')) return;
            
            // For demo purposes, preventing default navigation and showing an alert
            // In the real website, remove event.preventDefault() to allow navigation
            event.preventDefault(); 
            alert("Opening full profile page for " + doctorName + "...");
            
            // In the real website, this line will redirect to the profile page:
            // window.location.href = event.currentTarget.href;
        }

        // Function: When the "Book & Pay Online" button is clicked
        function handleBookingClick(event, doctorName) {
            // Prevent the card click event from triggering
            event.stopPropagation();
            event.preventDefault();
            
            // Alert for booking and payment gateway (Demo)
            alert("Redirecting to the appointment booking and secure payment page for " + doctorName + ".");
        }
    </script>

</body>
</html>
